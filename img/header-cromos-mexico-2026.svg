<svg width="1600" height="600" viewBox="0 0 1600 600" xmlns="http://www.w3.org/2000/svg">

  <!-- Fondo oscuro con degradado -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0F0F0F"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>

    <!-- Sombra para cromos -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="600" fill="url(#bgGrad)"/>

  <!-- Balón geométrico centrado entre borde izquierdo y primer cromo -->
  <g transform="translate(400,315)" opacity="0.22">
    <circle r="170" fill="#F2F2F2" stroke="#1A1A1A" stroke-width="16"/>
    <polygon points="-55,-150 55,-150 100,-85 55,-20 -55,-20 -100,-85"
      fill="#1FAF6B" stroke="#1A1A1A" stroke-width="12"/>
    <polygon points="-55,20 55,20 100,85 55,150 -55,150 -100,85"
      fill="#E64545" stroke="#1A1A1A" stroke-width="12"/>
    <polygon points="-170,-20 -100,-85 -55,-20 -55,20 -100,85 -170,20"
      fill="#F2F2F2" stroke="#1A1A1A" stroke-width="12"/>
    <polygon points="170,-20 100,-85 55,-20 55,20 100,85 170,20"
      fill="#F2F2F2" stroke="#1A1A1A" stroke-width="12"/>
  </g>

  <!-- Leyenda centrada respecto al balón -->
  <text x="405" y="300"
        text-anchor="middle"
        font-family="Pacifico, 'Kalam', 'Baloo', cursive"
        font-size="40"
        fill="#F2F2F2"
        font-weight="600">
    Completa tu colección.
  </text>

  <text x="405" y="350"
        text-anchor="middle"
        font-family="Pacifico, 'Kalam', 'Baloo', cursive"
        font-size="32"
        fill="#F2F2F2"
        font-weight="600">
    Intercambia. Conecta. Colecciona.
  </text>

  <!-- Cromos grandes (primer plano) -->
  <g transform="translate(780,160) rotate(-6)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="240" height="330" rx="18" fill="#F2F2F2"/>
    <rect x="12" y="12" width="216" height="306" rx="14" fill="#1A1A1A"/>
    <rect x="22" y="22" width="196" height="200" rx="10" fill="#1FAF6B"/>
    <circle cx="120" cy="85" r="35" fill="#F2F2F2" opacity="0.9"/>
    <rect x="85" y="125" width="70" height="70" rx="22" fill="#F2F2F2" opacity="0.9"/>
    <text x="30" y="290" font-family="Montserrat" font-size="38" fill="#F2F2F2" font-weight="700">10</text>
  </g>

  <g transform="translate(1000,150) rotate(4)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="240" height="330" rx="18" fill="#F2F2F2"/>
    <rect x="12" y="12" width="216" height="306" rx="14" fill="#1A1A1A"/>
    <rect x="22" y="22" width="196" height="200" rx="10" fill="#E64545"/>
    <circle cx="120" cy="85" r="35" fill="#F2F2F2" opacity="0.9"/>
    <rect x="85" y="125" width="70" height="70" rx="22" fill="#F2F2F2" opacity="0.9"/>
    <text x="30" y="290" font-family="Montserrat" font-size="38" fill="#F2F2F2" font-weight="700">7</text>
  </g>

  <g transform="translate(1220,180) rotate(-2)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="240" height="330" rx="18" fill="#F2F2F2"/>
    <rect x="12" y="12" width="216" height="306" rx="14" fill="#1A1A1A"/>
    <rect x="22" y="22" width="196" height="200" rx="10" fill="#F2C94C"/>
    <circle cx="120" cy="85" r="35" fill="#F2F2F2" opacity="0.9"/>
    <rect x="85" y="125" width="70" height="70" rx="22" fill="#F2F2F2" opacity="0.9"/>
    <text x="30" y="290" font-family="Montserrat" font-size="38" fill="#F2F2F2" font-weight="700">23</text>
  </g>

  <!-- Cromos medianos (más abajo para no tocar el menú) -->
  <g opacity="0.6" filter="url(#cardShadow)">
    <g transform="translate(840,270) rotate(-15)">
      <rect x="0" y="0" width="180" height="260" rx="16" fill="#F2F2F2"/>
      <rect x="10" y="10" width="160" height="240" rx="12" fill="#1A1A1A"/>
      <rect x="20" y="20" width="140" height="150" rx="10" fill="#1FAF6B"/>
      <circle cx="90" cy="55" r="25" fill="#F2F2F2" opacity="0.9"/>
      <rect x="60" y="85" width="60" height="60" rx="22" fill="#F2F2F2" opacity="0.9"/>
      <text x="135" y="230" font-family="Montserrat" font-size="28" fill="#F2F2F2" font-weight="700">8</text>
    </g>
    <g transform="translate(1080,280) rotate(2)">
      <rect x="0" y="0" width="180" height="260" rx="16" fill="#F2F2F2"/>
      <rect x="10" y="10" width="160" height="240" rx="12" fill="#1A1A1A"/>
      <rect x="20" y="20" width="140" height="150" rx="10" fill="#E64545"/>
      <circle cx="90" cy="55" r="25" fill="#F2F2F2" opacity="0.9"/>
      <rect x="60" y="85" width="60" height="60" rx="22" fill="#F2F2F2" opacity="0.9"/>
      <text x="120" y="230" font-family="Montserrat" font-size="28" fill="#F2F2F2" font-weight="700">21</text>
    </g>
    <g transform="translate(1310,310) rotate(6)">
      <rect x="0" y="0" width="180" height="260" rx="16" fill="#F2F2F2"/>
      <rect x="10" y="10" width="160" height="240" rx="12" fill="#1A1A1A"/>
      <rect x="20" y="20" width="140" height="150" rx="10" fill="#F2C94C"/>
      <circle cx="90" cy="55" r="25" fill="#F2F2F2" opacity="0.9"/>
      <rect x="60" y="85" width="60" height="60" rx="22" fill="#F2F2F2" opacity="0.9"/>
      <text x="120" y="230" font-family="Montserrat" font-size="28" fill="#F2F2F2" font-weight="700">19</text>
    </g>
  </g>

</svg>
