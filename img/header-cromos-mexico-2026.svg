<svg width="1920" height="500" viewBox="0 0 1920 500" xmlns="http://www.w3.org/2000/svg">

  <!-- Fondo oscuro con ligero degradado -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0F0F0F"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <!-- Sombra suave para cromos -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1920" height="500" fill="url(#bgGrad)"/>

  <!-- Balón geométrico semitransparente a la izquierda -->
  <g transform="translate(360,260)" opacity="0.22">
    <circle r="180" fill="#F2F2F2" stroke="#1A1A1A" stroke-width="16"/>
    <polygon points="-60,-160 60,-160 110,-90 60,-20 -60,-20 -110,-90"
      fill="#1FAF6B" stroke="#1A1A1A" stroke-width="12"/>
    <polygon points="-60,20 60,20 110,90 60,160 -60,160 -110,90"
      fill="#E64545" stroke="#1A1A1A" stroke-width="12"/>
    <polygon points="-180,-20 -110,-90 -60,-20 -60,20 -110,90 -180,20"
      fill="#F2F2F2" stroke="#1A1A1A" stroke-width="12"/>
    <polygon points="180,-20 110,-90 60,-20 60,20 110,90 180,20"
      fill="#F2F2F2" stroke="#1A1A1A" stroke-width="12"/>
  </g>

  <!-- Leyenda principal -->
  <text x="180" y="150"
        font-family="Montserrat, system-ui, sans-serif"
        font-size="40"
        fill="#F2F2F2"
        font-weight="700">
    Completa tu colección.
  </text>

  <text x="180" y="205"
        font-family="Montserrat, system-ui, sans-serif"
        font-size="32"
        fill="#F2F2F2"
        font-weight="600">
    Intercambia. Conecta. Colecciona.
  </text>

  <!-- Grupo de cromos (collage geométrico) -->
  <!-- Cromo grande 1 -->
  <g transform="translate(820,130) rotate(-7)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="260" height="360" rx="18" fill="#F2F2F2"/>
    <rect x="14" y="14" width="232" height="332" rx="14" fill="#1A1A1A"/>
    <rect x="26" y="26" width="208" height="220" rx="10" fill="#1FAF6B"/>
    <!-- Silueta jugador -->
    <circle cx="130" cy="90" r="40" fill="#F2F2F2" opacity="0.9"/>
    <rect x="90" y="135" width="80" height="80" rx="26" fill="#F2F2F2" opacity="0.9"/>
    <!-- Número -->
    <text x="40" y="320"
          font-family="Montserrat, system-ui, sans-serif"
          font-size="42"
          fill="#F2F2F2"
          font-weight="700">
      10
    </text>
  </g>

  <!-- Cromo grande 2 -->
  <g transform="translate(1040,110) rotate(5)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="260" height="360" rx="18" fill="#F2F2F2"/>
    <rect x="14" y="14" width="232" height="332" rx="14" fill="#1A1A1A"/>
    <rect x="26" y="26" width="208" height="220" rx="10" fill="#E64545"/>
    <!-- Silueta jugador -->
    <circle cx="130" cy="90" r="40" fill="#F2F2F2" opacity="0.9"/>
    <rect x="90" y="135" width="80" height="80" rx="26" fill="#F2F2F2" opacity="0.9"/>
    <!-- Número -->
    <text x="40" y="320"
          font-family="Montserrat, system-ui, sans-serif"
          font-size="42"
          fill="#F2F2F2"
          font-weight="700">
      7
    </text>
  </g>

  <!-- Cromo grande 3 -->
  <g transform="translate(1260,140) rotate(-3)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="260" height="360" rx="18" fill="#F2F2F2"/>
    <rect x="14" y="14" width="232" height="332" rx="14" fill="#1A1A1A"/>
    <rect x="26" y="26" width="208" height="220" rx="10" fill="#F2C94C"/>
    <!-- Silueta jugador -->
    <circle cx="130" cy="90" r="40" fill="#1A1A1A" opacity="0.9"/>
    <rect x="90" y="135" width="80" height="80" rx="26" fill="#1A1A1A" opacity="0.9"/>
    <!-- Número -->
    <text x="40" y="320"
          font-family="Montserrat, system-ui, sans-serif"
          font-size="42"
          fill="#F2F2F2"
          font-weight="700">
      23
    </text>
  </g>

  <!-- Cromos medianos de fondo -->
  <g opacity="0.7" filter="url(#cardShadow)">
    <g transform="translate(930,40) rotate(-12)">
      <rect x="0" y="0" width="200" height="300" rx="16" fill="#F2F2F2"/>
      <rect x="12" y="12" width="176" height="276" rx="12" fill="#1A1A1A"/>
      <rect x="22" y="22" width="156" height="180" rx="10" fill="#1FAF6B"/>
    </g>
    <g transform="translate(1150,40) rotate(8)">
      <rect x="0" y="0" width="200" height="300" rx="16" fill="#F2F2F2"/>
      <rect x="12" y="12" width="176" height="276" rx="12" fill="#1A1A1A"/>
      <rect x="22" y="22" width="156" height="180" rx="10" fill="#E64545"/>
    </g>
    <g transform="translate(1370,60) rotate(-5)">
      <rect x="0" y="0" width="200" height="300" rx="16" fill="#F2F2F2"/>
      <rect x="12" y="12" width="176" height="276" rx="12" fill="#1A1A1A"/>
      <rect x="22" y="22" width="156" height="180" rx="10" fill="#F2C94C"/>
    </g>
    <g transform="translate(1510,110) rotate(6)">
      <rect x="0" y="0" width="200" height="300" rx="16" fill="#F2F2F2"/>
      <rect x="12" y="12" width="176" height="276" rx="12" fill="#1A1A1A"/>
      <rect x="22" y="22" width="156" height="180" rx="10" fill="#1FAF6B"/>
    </g>
  </g>

  <!-- Cromos pequeños a la derecha -->
  <g opacity="0.45" filter="url(#cardShadow)">
    <g transform="translate(1550,220) rotate(-10)">
      <rect x="0" y="0" width="140" height="200" rx="14" fill="#F2F2F2"/>
      <rect x="10" y="10" width="120" height="180" rx="10" fill="#1A1A1A"/>
    </g>
    <g transform="translate(1660,170) rotate(5)">
      <rect x="0" y="0" width="140" height="200" rx="14" fill="#F2F2F2"/>
      <rect x="10" y="10" width="120" height="180" rx="10" fill="#1A1A1A"/>
    </g>
    <g transform="translate(1770,210) rotate(-4)">
      <rect x="0" y="0" width="140" height="200" rx="14" fill="#F2F2F2"/>
      <rect x="10" y="10" width="120" height="180" rx="10" fill="#1A1A1A"/>
    </g>
  </g>

</svg>
