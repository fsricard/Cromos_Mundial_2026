<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <!-- Fondo transparente -->
  <rect width="100%" height="100%" fill="none"/>

  <!-- Balón geométrico con contorno grueso -->
  <g transform="translate(256,150)">
    <circle r="120" fill="#F2F2F2" stroke="#1A1A1A" stroke-width="14"/>

    <!-- Paneles geométricos -->
    <polygon points="-40,-110 40,-110 80,-60 40,-10 -40,-10 -80,-60"
      fill="#1FAF6B" stroke="#1A1A1A" stroke-width="10"/>

    <polygon points="-40,10 40,10 80,60 40,110 -40,110 -80,60"
      fill="#E64545" stroke="#1A1A1A" stroke-width="10"/>

    <polygon points="-120,-10 -80,-60 -40,-10 -40,10 -80,60 -120,10"
      fill="#F2F2F2" stroke="#1A1A1A" stroke-width="10"/>

    <polygon points="120,-10 80,-60 40,-10 40,10 80,60 120,10"
      fill="#F2F2F2" stroke="#1A1A1A" stroke-width="10"/>
  </g>

  <!-- Texto principal -->
  <text x="50%" y="330" text-anchor="middle"
        font-family="Montserrat, sans-serif"
        font-size="48" fill="#1A1A1A" font-weight="600">
    Cromos
  </text>

  <text x="50%" y="380" text-anchor="middle"
        font-family="Montserrat, sans-serif"
        font-size="42" fill="#1FAF6B" font-weight="600">
    Mexico 2026
  </text>

  <!-- Greca negra minimalista -->
  <g transform="translate(256,420)" stroke="#1A1A1A" stroke-width="6" fill="none">
    <line x1="-80" y1="0" x2="80" y2="0"/>
    <polygon points="-20,0 -10,-12 0,0 -10,12"/>
    <polygon points="20,0 30,-12 40,0 30,12"/>
  </g>

</svg>
